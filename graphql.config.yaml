projects:
  kabinet:
    schema: http://localhost/kabinet/schema
    documents: graphql/*/**.graphql
    extensions:
      turms:
        out_dir: kabinet/api
        exclude_typenames: true
        dump_configuration: true
        dump_schema: true
        coercible_scalars:
            ID: rath.scalars.IDCoercible
        freeze:
          enabled: true
        options:
          enabled: true
          allow_population_by_field_name: true
          use_enum_values: true
          extra: forbid
          types:
            - input
        stylers:
          - type: turms.stylers.default.DefaultStyler
          - type: turms.stylers.appender.AppenderStyler
            append_fragment: ""
        plugins:
          - type: turms.plugins.enums.EnumsPlugin
          - type: turms.plugins.inputs.InputsPlugin
          - type: turms.plugins.input_funcs.InputFuncsPlugin
          - type: turms.plugins.fragments.FragmentsPlugin
          - type: turms.plugins.operations.OperationsPlugin
          - type: turms.plugins.funcs.FuncsPlugin
            
            expand_input_types:
              - input
            global_kwargs:
              - type: kabinet.rath.KabinetRath
                key: rath
                description:
                  The client we want to use (defaults to the currently active
                  client)
            definitions:
              - type: subscription
                is_async: true
                use: kabinet.funcs.asubscribe
              - type: query
                is_async: true
                use: kabinet.funcs.aexecute
              - type: mutation
                is_async: true
                use: kabinet.funcs.aexecute
              - type: subscription
                use: kabinet.funcs.subscribe
              - type: query
                use: kabinet.funcs.execute
              - type: mutation
                use: kabinet.funcs.execute
        processors:
          - type: turms.processors.disclaimer.DisclaimerProcessor
        scalar_definitions:
          ActionHash: kabinet.scalars.ActionHash
          uuid: str
          Callback: str
          Any: typing.Any
          AnyInput: typing.Any
          JSONSerializable: kabinet.scalars.JSONSerializable
          AnyDefault: typing.Any
          Args: kabinet.scalars.Args
          ValueMap: kabinet.scalars.ValueMap
          ID: rath.scalars.ID
          Arg: typing.Any
          InstanceId: kabinet.scalars.InstanceId
          Identifier: kabinet.scalars.Identifier
          SearchQuery: kabinet.scalars.SearchQuery
          ValidatorFunction: kabinet.scalars.ValidatorFunction
          UntypedParams: typing.Any