query ListReleases {
  releases {
    ...ListRelease
  }
}

query GetRelease($id: ID!) {
  release(id: $id) {
    ...Release
  }
}

query SearchReleases($search: String, $values: [ID!], $limit: Int, $offset: Int) {
  options: releases(
    filters: { search: $search, ids: $values }
    pagination: { limit: $limit, offset: $offset }
  ) {
    value: id
    label: name
  }
}
