query MatchFlavour($actions: [ActionHash!], $environment: EnvironmentInput) {
  matchFlavour(input: { actions: $actions, environment: $environment }) {
    id
    image {
      imageString
      buildAt
    }
  }
}

query ListFlavours($filters: FlavourFilter, $pagination: OffsetPaginationInput, $ordering: [FlavourOrder!]) {
  flavours(filters: $filters, pagination: $pagination, ordering: $ordering) {
    ...ListFlavour
  }
}

query GetFlavour($id: ID!) {
  flavour(id: $id) {
    ...Flavour
  }
}

query SearchFlavours($search: String, $values: [ID!], $limit: Int, $offset: Int) {
  options: flavours(
    filters: { search: $search, ids: $values }
    pagination: { limit: $limit, offset: $offset }
  ) {
    value: id
    label: name
  }
}
