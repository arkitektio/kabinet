query ListPod {
  pods {
    ...ListPod
  }
}

query GetPod($id: ID!) {
  pod(id: $id) {
    ...Pod
  }
}

query MyPodAt($localId: ID!) {
  myPodAt(localId: $localId) {
    ...Pod
  }
}

query SearchPods($search: String, $values: [ID!], $limit: Int, $offset: Int) {
  options: pods(
    filters: { search: $search, ids: $values}
    pagination: { limit: $limit, offset: $offset }
  ) {
    value: id
    label: name
  }
}
