query GetDeployment($id: ID!) {
  deployment(id: $id) {
    ...Deployment
  }
}

query ListDeployments {
  deployments {
    ...ListDeployment
  }
}

query SearchDeployments($search: String, $values: [ID!], $limit: Int, $offset: Int) {
  options: deployments(
    filters: { search: $search, ids: $values }
    pagination: { limit: $limit, offset: $offset }
  ) {
    value: id
    label: name
  }
}
